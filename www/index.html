<!DOCTYPE html>
<html lang="en">
<head>
	<meta charset="UTF-8" />
	<meta name="viewport" content="width=device-width, initial-scale=1.0" />
	<title>Shogi Sensei</title>
	<link rel="stylesheet" href="style.css" />
</head>
<body>
	<nav class="top-nav">
		<div class="container nav-inner">
			<a href="#resumo" class="nav-item" id="resumo-link">Resumo</a>
			<a href="#proposta" class="nav-item" id="proposta-link">Proposta</a>
			<a href="#" class="nav-item" id="monografia-link">Monografia</a>
			<a href="#" class="nav-item" id="repositorio-link">Repositório</a>
			<a href="#" class="nav-item" id="demo-link">Demo</a>
		</div>
	</nav>

	<main class="container">
		<section>
			<h1>Trabalho de Conclusão de Curso</h1>
			<p>Aluno: Vinícius Yuiti Okuma Shimizu</p>
			<p>Orientador: Denis Deratani Maua</p>
		</section>

		<section class="content-panel">
			<article id="markdown-content">
				<!-- <p>Select an option in the top bar to load content.</p> -->
			</article>
		</section>
	</main>

	<script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
	<script>
		const resumoLink = document.getElementById("resumo-link");
		const propostaLink = document.getElementById("proposta-link");
		const monografiaLink = document.getElementById("monografia-link");
		const repositorioLink = document.getElementById("repositorio-link");
		const demoLink = document.getElementById("demo-link");
		const markdownContent = document.getElementById("markdown-content");

		async function loadMarkdown(filePath, errorMessage) {
			try {
				const response = await fetch(filePath);

				if (!response.ok) {
					throw new Error("Unable to load markdown file");
				}

				const markdownText = await response.text();
				markdownContent.innerHTML = marked.parse(markdownText);
			} catch (error) {
				markdownContent.innerHTML = `<p>${errorMessage}</p>`;
			}
		}

		async function loadResumo(event) {
			event.preventDefault();
			await loadMarkdown("intro.md", "Could not load Resumo content right now.");
		}

		async function loadProposta(event) {
			event.preventDefault();
			await loadMarkdown("proposta.md", "Could not load Proposta content right now.");
		}

		function loadWorkInProgress(event) {
			event.preventDefault();
			markdownContent.innerHTML = "<h2>Work in Progress</h2><p>This section is not available yet.</p>";
		}

		function openRepositorio(event) {
			event.preventDefault();
			window.open("https://github.com/Vinicius-Shimizu/Shogi-sensei", "_blank", "noopener,noreferrer");
		}

		resumoLink.addEventListener("click", loadResumo);
		propostaLink.addEventListener("click", loadProposta);
		monografiaLink.addEventListener("click", loadWorkInProgress);
		demoLink.addEventListener("click", loadWorkInProgress);
		repositorioLink.addEventListener("click", openRepositorio);
		loadMarkdown("intro.md", "Could not load Intro content right now.");
	</script>

</body>
</html>
